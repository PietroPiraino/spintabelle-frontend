<header class="header glass">
  <div class="container header__inner">
    <a routerLink="/" class="header__brand" (click)="closeMenu()" aria-label="Best Fish Forever — home">
      <img src="logo-96.png" alt="" width="42" height="42" />
      <span class="header__brand-text">
        Best Fish <em>Forever</em>
      </span>
    </a>

    <button
      type="button"
      class="header__burger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="nav-principale"
      aria-label="Apri o chiudi il menu"
    >
      <span></span><span></span><span></span>
    </button>

    <nav id="nav-principale" class="header__nav" [class.is-open]="menuOpen()" aria-label="Navigazione principale">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="is-active"
          (click)="closeMenu()"
          class="header__link"
        >{{ link.label }}</a>
      }
      @if (auth.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="is-active" (click)="closeMenu()" class="header__link header__link--admin">
          Admin
        </a>
      }

      <!-- scelta tema: tendina all'hover su desktop, riga di opzioni nel menù mobile -->
      <div class="header__theme-wrap" [class.is-open]="themeMenuOpen()">
        <button
          type="button"
          class="header__theme"
          (click)="toggleThemeMenu()"
          aria-haspopup="true"
          [attr.aria-expanded]="themeMenuOpen()"
          aria-label="Scegli il tema"
          title="Tema"
        >
          <span aria-hidden="true">{{ themeService.icon() }}</span>
        </button>
        <div class="header__theme-menu" role="menu" aria-label="Tema">
          @for (t of themeService.options; track t.value) {
            <button
              type="button"
              class="header__theme-option"
              role="menuitemradio"
              [attr.aria-checked]="t.value === themeService.theme()"
              [class.is-active]="t.value === themeService.theme()"
              (click)="setTheme(t.value)"
            >
              <span class="header__theme-icon" aria-hidden="true">{{ t.icon }}</span>
              {{ t.name }}
            </button>
          }
        </div>
      </div>

      <div class="header__auth">
        @if (!auth.ready()) {
          <!-- sessione in ripristino: evita il lampeggio Accedi → nickname -->
          <span class="header__auth-wait" aria-hidden="true"></span>
        } @else if (auth.isAuthenticated()) {
          <a
            routerLink="/account"
            (click)="closeMenu()"
            class="badge badge--tag header__points"
            title="Punti BFF"
            aria-label="Punti BFF"
          >★ {{ auth.points() }}</a>
          <a
            routerLink="/account"
            routerLinkActive="is-active"
            (click)="closeMenu()"
            class="header__user"
            title="Il mio account"
          >
            <span class="header__user-dot" aria-hidden="true"></span>
            <span class="header__user-name">{{ auth.displayName() }}</span>
          </a>
          <button type="button" class="btn btn--ghost btn--sm" (click)="logout()">Esci</button>
        } @else {
          <a routerLink="/login" (click)="closeMenu()" class="header__link">Accedi</a>
          <a routerLink="/registrazione" (click)="closeMenu()" class="btn btn--primary btn--sm">Registrati</a>
        }
      </div>
    </nav>
  </div>
</header>
