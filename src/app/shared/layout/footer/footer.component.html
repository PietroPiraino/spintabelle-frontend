<footer class="footer">

        <img src="logo-96.png" alt="" width="56" height="56" />

      <nav class="footer__col" aria-label="Mappa del sito">

        <a [href]="social.discord" target="_blank" rel="noopener">

        <a [href]="social.instagram" target="_blank" rel="noopener">
