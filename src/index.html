<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Best Fish Forever — Scuola di Poker Spin & Go</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Preconnessione all'API: scalda DNS+TCP+TLS già durante il parsing dell'HTML,
       perché il bootstrap di sessione chiama l'API a ogni caricamento di pagina. -->
  <link rel="preconnect" href="https://api.bestfishforever.it" crossorigin>
  <link rel="dns-prefetch" href="https://api.bestfishforever.it">

  <meta name="description" content="Best Fish Forever è la scuola italiana di poker dedicata a Spin & Go e Twister: lezioni video, tabelle GTO e una community di studio su Discord.">
  <meta name="theme-color" content="#f7f5f0">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Best Fish Forever">
  <meta property="og:title" content="Best Fish Forever — Scuola di Poker Spin & Go">
  <meta property="og:description" content="Lezioni video, tabelle GTO e community di studio per Spin & Go e Twister.">
  <meta property="og:url" content="https://bestfishforever.it/">
  <meta property="og:image" content="https://bestfishforever.it/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="it_IT">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Best Fish Forever — Scuola di Poker Spin & Go">
  <meta name="twitter:description" content="Lezioni video, tabelle GTO e community di studio per Spin & Go e Twister.">
  <meta name="twitter:image" content="https://bestfishforever.it/og.png">

  <link rel="canonical" href="https://bestfishforever.it/">

  <!-- Dati strutturati: aiuta Google a riconoscere la scuola (rich results) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Best Fish Forever",
      "alternateName": "BFF",
      "url": "https://bestfishforever.it/",
      "logo": "https://bestfishforever.it/logo-256.png",
      "description": "Scuola italiana di poker dedicata a Spin & Go e Twister: lezioni video, tabelle GTO, allenamento e lezioni dal vivo.",
      "sameAs": ["https://www.youtube.com/@Best_Fish_Forever"]
    }
  </script>

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="logo-256.png">

  <!-- Font self-hostati (vedi src/styles/_fonts.scss): nessuna chiamata a Google Fonts / gstatic. -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/bricolage-grotesque-latin.woff2" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="/fonts/instrument-sans-latin.woff2" crossorigin>

  <!-- Tema applicato PRIMA del paint: niente flash chiaro/scuro -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('bff-theme');
        if (theme !== 'light' && theme !== 'dark' && theme !== 'tramonto') {
          theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = theme;
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>

  <!-- Loader pre-bootstrap: visibile finché Angular non rimpiazza il contenuto di app-root -->
  <style>
    .boot-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #f7f5f0;
      background-image:
        radial-gradient(700px 420px at 85% -6%, rgba(255, 106, 31, 0.12), transparent 60%),
        radial-gradient(560px 400px at -8% 18%, rgba(0, 212, 212, 0.1), transparent 62%);
      font-family: 'Bricolage Grotesque', 'Segoe UI', sans-serif;
      color: #16223f;
    }
    .boot-loader__cards { display: flex; }
    .boot-loader__card {
      display: grid;
      place-items: center;
      width: 52px;
      height: 74px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid rgba(22, 34, 63, 0.2);
      box-shadow: 0 10px 26px rgba(22, 34, 63, 0.12), 0 0 16px rgba(255, 106, 31, 0.15);
      font-size: 1.15rem;
      font-weight: 800;
      animation: boot-deal 1.5s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }
    .boot-loader__card:nth-child(1) { transform: rotate(-12deg) translateX(8px); }
    .boot-loader__card:nth-child(2) { transform: rotate(2deg) translateY(-7px); animation-delay: 0.18s; z-index: 1; }
    .boot-loader__card:nth-child(3) { transform: rotate(12deg) translateX(-8px); color: #e25510; animation-delay: 0.36s; }
    @keyframes boot-deal { 0%, 100% { translate: 0 0; } 50% { translate: 0 -9px; } }
    .boot-loader__brand { font-weight: 800; font-size: 1.05rem; letter-spacing: 0.02em; }
    .boot-loader__brand em { font-style: normal; color: #ff6a1f; }
    .boot-loader__bar {
      width: 132px;
      height: 3px;
      border-radius: 3px;
      overflow: hidden;
      background: rgba(22, 34, 63, 0.1);
      position: relative;
    }
    .boot-loader__bar::after {
      content: '';
      position: absolute;
      inset: 0;
      width: 45%;
      border-radius: 3px;
      background: linear-gradient(90deg, #ff6a1f, #ffb547);
      box-shadow: 0 0 10px rgba(255, 106, 31, 0.6);
      animation: boot-slide 1.1s ease-in-out infinite alternate;
    }
    @keyframes boot-slide { to { translate: 122% 0; } }
    @media (prefers-reduced-motion: reduce) {
      .boot-loader__card, .boot-loader__bar::after { animation: none; }
    }
    [data-theme='dark'] .boot-loader {
      background: #0b1124;
      background-image:
        radial-gradient(700px 420px at 85% -6%, rgba(255, 106, 31, 0.14), transparent 60%),
        radial-gradient(560px 400px at -8% 18%, rgba(46, 230, 230, 0.1), transparent 62%);
      color: #ede4cd;
    }
    [data-theme='dark'] .boot-loader__bar { background: rgba(237, 228, 205, 0.12); }
    [data-theme='tramonto'] .boot-loader {
      background: #fdeee4;
      background-image:
        radial-gradient(700px 420px at 85% -6%, rgba(244, 63, 127, 0.14), transparent 60%),
        radial-gradient(560px 400px at -8% 18%, rgba(160, 107, 240, 0.12), transparent 62%);
      color: #46213c;
    }
    [data-theme='tramonto'] .boot-loader__bar { background: rgba(70, 33, 60, 0.12); }
    [data-theme='tramonto'] .boot-loader__brand em,
    [data-theme='tramonto'] .boot-loader__card:nth-child(3) { color: #f43f7f; }
    [data-theme='tramonto'] .boot-loader__bar::after {
      background: linear-gradient(90deg, #f43f7f, #ffb547);
      box-shadow: 0 0 10px rgba(244, 63, 127, 0.6);
    }
  </style>
</head>
<body>
  <app-root>
    <div class="boot-loader" role="status" aria-label="Caricamento del sito">
      <div class="boot-loader__cards" aria-hidden="true">
        <span class="boot-loader__card">7♣</span>
        <span class="boot-loader__card">♣</span>
        <span class="boot-loader__card">4♣</span>
      </div>
      <span class="boot-loader__brand">Best Fish <em>Forever</em></span>
      <div class="boot-loader__bar" aria-hidden="true"></div>
    </div>
  </app-root>
</body>
</html>
